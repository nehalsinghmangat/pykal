# .readthedocs.yml
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    # install your package so autodoc can import it
    - method: pip
      path: .
    # install dev extras (Sphinx, theme, napoleon, myst-parser, etc.)
    - method: pip
      args: ["-e", ".[dev]"]